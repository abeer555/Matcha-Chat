      function setOverlayStatus(label) {
        callCardLabel.textContent = label;
      }
      function hideCallOverlay() {
        callOverlay.classList.remove("visible");
      }

      // ── Initiator flow ───────────────────────────────────────────
      async function initiateCall() {
        if (callState.active || callState.peer) return;

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          renderSystemMessage(
            "⚠️ Your browser doesn't support voice calls (requires HTTPS or localhost).",
          );
          return;
        }
        const peer = getCallablePeer();
        if (!peer) {
          renderSystemMessage(
            "⚠️ Need exactly 1 other online user to start a call.",
          );
          return;
        }

        callState.peer = peer;
        callState.isInitiator = true;

        // Show overlay immediately — keep it visible through entire setup
        showCallOverlay("Requesting microphone…", peer, [
          { text: "📵", cls: "btn-call-decline", fn: cancelOutgoingCall },
        ]);

        // Get mic before we notify the other side so we're fully ready
        try {
          callState.stream = await navigator.mediaDevices.getUserMedia({
            audio: true,
            video: false,
          });
        } catch (err) {
          renderSystemMessage(`⚠️ Microphone error: ${err.message}`);
          callState.peer = null;
          callState.isInitiator = false;
          hideCallOverlay();
          return;
        }

        // Guard: user may have cancelled during the getUserMedia dialog
        if (!callState.peer) {
          stopStream();
          return;
        }

        setOverlayStatus("Calling…");
        wsSend({ type: "call_request", target: peer });
        renderSystemMessage(`📞 Calling @${peer}…`);
      }

      function cancelOutgoingCall() {
        const peer = callState.peer;
        callState.peer = null;
        callState.isInitiator = false;
        stopStream();
        hideCallOverlay();
        if (peer) {
          wsSend({ type: "call_ended", target: peer });
          renderSystemMessage("📵 Call cancelled.");
        }
      }

      // ── Callee flow ──────────────────────────────────────────────
      function showIncomingCall(from) {
        // Don't show if we're already in a call
        if (callState.active || (callState.peer && callState.peer !== from)) {
          wsSend({ type: "call_declined", target: from });
          return;
        }
        callState.peer = from;
        showCallOverlay("Incoming Call", from, [
          { text: "📞", cls: "btn-call-accept", fn: () => acceptCall(from) },
          { text: "📵", cls: "btn-call-decline", fn: () => declineCall(from) },
        ]);
        renderSystemMessage(`📞 Incoming call from @${from}`);
      }

      async function acceptCall(from) {
        if (!callState.peer) return; // already cancelled or timed out
        setOverlayStatus("Requesting microphone…");
        // Disable buttons so they can't be double-clicked
        callCardActions
          .querySelectorAll("button")
          .forEach((b) => (b.disabled = true));

        try {
          callState.stream = await navigator.mediaDevices.getUserMedia({
            audio: true,
            video: false,
          });
        } catch (err) {
          renderSystemMessage(`⚠️ Microphone error: ${err.message}`);
          wsSend({ type: "call_declined", target: from });
          callState.peer = null;
          hideCallOverlay();
          return;
        }

        if (!callState.peer) {
          stopStream();
          hideCallOverlay();
          return;
        }

        setOverlayStatus("Connecting…");
        // Create PC BEFORE sending call_accepted so it's ready when offer arrives
        setupPeerConnection(false);
        wsSend({ type: "call_accepted", target: from });
      }

      function declineCall(from) {
        wsSend({ type: "call_declined", target: from });
        callState.peer = null;
        hideCallOverlay();
        renderSystemMessage(`You declined the call from @${from}.`);
      }

      // ── Initiator receives "accepted" ────────────────────────────
      function onCallAccepted(from) {
        // Don't hide overlay — update the status label in-place
        setOverlayStatus("Connecting…");
        // Mic was already acquired in initiateCall; just set up the PC
        callState.peer = from;
        setupPeerConnection(true); // caller creates & sends offer
      }

      function onCallDeclined(from) {
        stopStream();
        hideCallOverlay();
        callState.peer = null;
        callState.isInitiator = false;
        renderSystemMessage(`@${from} declined the call.`);
      }

      function stopStream() {
        if (callState.stream) {
          callState.stream.getTracks().forEach((t) => t.stop());
          callState.stream = null;
        }
      }

      // ── ICE candidate buffering ──────────────────────────────────
      // Preserve any candidates that arrived before the PC was created
      // (can happen if the remote's ICE gathers faster than our async setup).
      function bufferOrAddIce(candidate) {
        if (!callState.pc) {
          callState.pendingIce.push(candidate);
          return;
        }
        if (callState.remoteDescSet) {
          callState.pc
            .addIceCandidate(new RTCIceCandidate(candidate))
            .catch(() => {});
        } else {
          callState.pendingIce.push(candidate);
        }
      }

      async function drainPendingIce() {
        callState.remoteDescSet = true;
        const queue = callState.pendingIce.splice(0); // drain without resetting the array ref
        for (const c of queue) {
          try {
            await callState.pc.addIceCandidate(new RTCIceCandidate(c));
          } catch (_) {}
        }
      }

      // ── Core peer connection ─────────────────────────────────────
      function setupPeerConnection(createOffer) {
        const pc = new RTCPeerConnection(STUN_SERVERS);
        // NOTE: do NOT reset pendingIce here — candidates may have arrived
        // while getUserMedia was running (e.g. from the remote peer's faster setup)
        callState.pc = pc;
        callState.remoteDescSet = false;

        if (callState.stream) {
          callState.stream
            .getTracks()
            .forEach((t) => pc.addTrack(t, callState.stream));
        }

        pc.ontrack = (e) => {
          remoteAudio.srcObject = e.streams[0];
        };

        pc.onicecandidate = (e) => {
          // null candidate = gathering complete; don't send
          if (e.candidate && callState.peer) {
            wsSend({
              type: "webrtc_ice",
              target: callState.peer,
              payload: e.candidate,
            });
          }
        };

        // Use iceConnectionState — most reliable across browsers
        pc.oniceconnectionstatechange = () => {
          const s = pc.iceConnectionState;
          console.log("[call] iceConnectionState →", s);
          if ((s === "connected" || s === "completed") && !callState.active) {
            clearTimeout(callState.connectTimeoutID);
            startActiveCall();
          } else if (s === "failed") {
            renderSystemMessage("⚠️ Call failed (ICE). Try again.");
            endCall(true);
          }
        };

        pc.onconnectionstatechange = () => {
          const s = pc.connectionState;
          console.log("[call] connectionState →", s);
          if (s === "connected" && !callState.active) {
            clearTimeout(callState.connectTimeoutID);
            startActiveCall();
          } else if (s === "failed") {
            endCall(true);
          }
        };

        // 25-second connection timeout
        callState.connectTimeoutID = setTimeout(() => {
          if (!callState.active && callState.pc === pc) {
            renderSystemMessage(
              "⚠️ Call timed out. Could not reach the other side.",
            );
            endCall(true);
          }
        }, 25000);

        if (createOffer) {
          pc.createOffer({ offerToReceiveAudio: true })
            .then((offer) => pc.setLocalDescription(offer))
            .then(() => {
              if (!callState.peer) {
                endCall(true);
                return;
              }
              wsSend({
                type: "webrtc_offer",
                target: callState.peer,
                payload: pc.localDescription,
              });
            })
            .catch((err) => {
              renderSystemMessage(`⚠️ Could not create offer: ${err.message}`);
              endCall(true);
            });
        }
      }

      async function handleWebRTCOffer(from, offer) {
        if (!callState.pc) {
          console.warn("[call] Offer arrived but no PC exists");
          return;
        }
        try {
          await callState.pc.setRemoteDescription(
            new RTCSessionDescription(offer),
          );
          await drainPendingIce();
          const answer = await callState.pc.createAnswer();
          await callState.pc.setLocalDescription(answer);
          wsSend({
            type: "webrtc_answer",
            target: from,
            payload: callState.pc.localDescription,
          });
        } catch (err) {
          renderSystemMessage(`⚠️ WebRTC handshake error: ${err.message}`);
          endCall(true);
        }
      }

      async function handleWebRTCAnswer(answer) {
        if (!callState.pc) return;
        try {
          await callState.pc.setRemoteDescription(
            new RTCSessionDescription(answer),
          );
          await drainPendingIce();
        } catch (err) {
          renderSystemMessage(`⚠️ Could not apply answer: ${err.message}`);
          endCall(true);
        }
      }

      function handleWebRTCIce(candidate) {
        bufferOrAddIce(candidate);
      }

      // ── Active call ──────────────────────────────────────────────
      function startActiveCall() {
        if (callState.active) return; // guard duplicate fires
        callState.active = true;
        callState.seconds = 0;
        callPeerName.textContent = callState.peer;
        activeCallBar.classList.add("visible");
        hideCallOverlay();
        refreshCallButton();
        callState.timerID = setInterval(() => {
          callState.seconds++;
          const m = String(Math.floor(callState.seconds / 60)).padStart(2, "0");
          const s = String(callState.seconds % 60).padStart(2, "0");
          callTimerEl.textContent = `${m}:${s}`;
        }, 1000);
        renderSystemMessage(`📞 Call connected with @${callState.peer}.`);
      }

      function endCall(remote = false) {
        if (!remote && callState.peer) {
          wsSend({ type: "call_ended", target: callState.peer });
        }
        clearInterval(callState.timerID);
        clearTimeout(callState.connectTimeoutID);
        callState.connectTimeoutID = null;
        if (callState.pc) {
          try {
            callState.pc.close();
          } catch (_) {}
          callState.pc = null;
        }
        stopStream();
        remoteAudio.srcObject = null;
        activeCallBar.classList.remove("visible");
        hideCallOverlay();
        const peer = callState.peer;
        callState.active = false;
        callState.muted = false;
        callState.isInitiator = false;
        callState.peer = null;
        callState.seconds = 0;
        callState.pendingIce = [];
        callState.remoteDescSet = false;
        refreshCallButton();
        if (peer) renderSystemMessage(`📵 Call ended.`);
      }

      btnMute.addEventListener("click", () => {
        if (!callState.stream) return;
        callState.muted = !callState.muted;
        callState.stream.getAudioTracks().forEach((t) => {
          t.enabled = !callState.muted;
        });
        btnMute.textContent = callState.muted ? "🔇 Unmute" : "🎤 Mute";
      });

      // ═══════════════════════════════════════════════════════════
      //  FILE & PHOTO SENDING
      // ═══════════════════════════════════════════════════════════

      const fileInput       = document.getElementById("file-input");
      const btnAttach       = document.getElementById("btn-attach");
      const filePreviewBar  = document.getElementById("file-preview-bar");
      const lightbox        = document.getElementById("lightbox");
      const lightboxImg     = document.getElementById("lightbox-img");
      const lightboxClose   = document.getElementById("lightbox-close");

      // Staged file waiting to be sent
      const stagedFile = { file: null, dataURL: null };

      /** Format bytes → human-readable string */
      function formatBytes(bytes) {
        if (bytes < 1024)       return bytes + " B";
        if (bytes < 1024*1024)  return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / (1024*1024)).toFixed(1) + " MB";
      }

      /** Pick a representative emoji icon for a given MIME type */
      function fileIcon(mimeType) {
        if (mimeType.startsWith("image/"))        return "🖼️";
        if (mimeType === "application/pdf")       return "📄";
        if (mimeType.startsWith("video/"))        return "🎬";
        if (mimeType.startsWith("audio/"))        return "🎵";
        if (mimeType.includes("zip") || mimeType.includes("compressed")) return "📦";
        if (mimeType.startsWith("text/"))         return "📝";
        if (mimeType.includes("word") || mimeType.includes("document")) return "📃";
        if (mimeType.includes("sheet") || mimeType.includes("excel"))   return "📊";
        return "📎";
      }

      // ── Attach button → open picker ───────────────────────────
      btnAttach.addEventListener("click", () => {
        fileInput.value = ""; // reset so same file can be re-selected
        fileInput.click();
      });

      // ── File selected ─────────────────────────────────────────
      fileInput.addEventListener("change", () => {
        const file = fileInput.files[0];
        if (!file) return;

        // 10 MB guard
        if (file.size > 10 * 1024 * 1024) {
          renderSystemMessage("⚠️ File too large (max 10 MB).");
          return;
        }

        const reader = new FileReader();
        reader.onload = (e) => {
          stagedFile.file   = file;
          stagedFile.dataURL = e.target.result;
          showFilePreviewBar(file, e.target.result);
          btnAttach.classList.add("has-file");
          messageInput.focus();
        };
        reader.readAsDataURL(file);
      });

      /** Show the preview bar with a thumbnail or icon */
      function showFilePreviewBar(file, dataURL) {
        const isImage = file.type.startsWith("image/");

        const thumbHTML = isImage
          ? `<img class="file-preview-thumb" src="${dataURL}" alt="preview" />`
          : `<div class="file-preview-icon">${fileIcon(file.type)}</div>`;

        filePreviewBar.innerHTML = `
          ${thumbHTML}
          <div class="file-preview-info">
            <div class="file-preview-name">${escapeHTML(file.name)}</div>
            <div class="file-preview-size">${formatBytes(file.size)}</div>
          </div>
          <button class="file-preview-dismiss" id="file-preview-dismiss" aria-label="Remove attachment">✕</button>
        `;
        filePreviewBar.classList.add("visible");

        document.getElementById("file-preview-dismiss").addEventListener("click", clearStagedFile);
      }

      /** Clear staged file and hide the preview bar */
      function clearStagedFile() {
        stagedFile.file   = null;
        stagedFile.dataURL = null;
        filePreviewBar.classList.remove("visible");
        filePreviewBar.innerHTML = "";
        btnAttach.classList.remove("has-file");
        fileInput.value = "";
      }

      // ── Send file ─────────────────────────────────────────────
      function handleSendFile() {
        const { file, dataURL } = stagedFile;
        if (!file || !dataURL) return;

        const payload = {
          filename: file.name,
          mimeType: file.type,
          size:     file.size,
          dataURL,
        };

        // Render locally
        renderFileMessage(currentUser, payload, true);

        // Broadcast over WebSocket
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: "file", ...payload }));
        }

        clearStagedFile();
      }

      // ── Receive file ──────────────────────────────────────────
      function handleReceiveFile(sender, payload) {
        renderFileMessage(sender, payload, false);
      }

      // ── Render: image or file card ────────────────────────────
      function renderFileMessage(sender, payload, isMe) {
        const { filename, mimeType, dataURL, size } = payload;
        const isImage = mimeType && mimeType.startsWith("image/");

        const msgDiv = document.createElement("div");
        msgDiv.className = `msg-wrapper ${isMe ? "sent" : "received"}`;

        let bubbleContent;
        if (isImage) {
          // Image bubble — click to open lightbox
          const imgId = `img-${Date.now()}-${Math.random().toString(36).slice(2)}`;
          bubbleContent = `
            <div class="msg-author">${isMe ? "You" : escapeHTML(sender)}</div>
            <div class="msg-bubble is-media">
              <img
                class="msg-image"
                id="${imgId}"
                src="${dataURL}"
                alt="${escapeHTML(filename)}"
                title="${escapeHTML(filename)}"
              />
            </div>
            <div class="msg-time">${getTimeString()}</div>
          `;
          msgDiv.innerHTML = bubbleContent;
          msgDiv.querySelector(`#${imgId}`).addEventListener("click", () => openLightbox(dataURL));
        } else {
          // File card with download link
          const icon = fileIcon(mimeType);
          bubbleContent = `
            <div class="msg-author">${isMe ? "You" : escapeHTML(sender)}</div>
            <div class="msg-bubble is-file">
              <a
                class="msg-file-card"
                href="${dataURL}"
                download="${escapeHTML(filename)}"
                title="Download ${escapeHTML(filename)}"
              >
                <span class="msg-file-icon">${icon}</span>
                <div class="msg-file-details">
                  <div class="msg-file-name">${escapeHTML(filename)}</div>
                  <div class="msg-file-size">${formatBytes(size)}</div>
                </div>
                <span class="msg-file-dl">⬇️</span>
              </a>
            </div>
            <div class="msg-time">${getTimeString()}</div>
          `;
          msgDiv.innerHTML = bubbleContent;
        }

        chatMessages.appendChild(msgDiv);
        scrollToBottom();
      }

      // ── Lightbox ──────────────────────────────────────────────
      function openLightbox(src) {
        lightboxImg.src = src;
        lightbox.classList.add("visible");
      }
      function closeLightbox() {
        lightbox.classList.remove("visible");
        // Clear src after transition to free memory
        setTimeout(() => { lightboxImg.src = ""; }, 300);
      }
      lightbox.addEventListener("click", (e) => {
        if (e.target === lightbox) closeLightbox();
      });
      lightboxClose.addEventListener("click", closeLightbox);
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && lightbox.classList.contains("visible")) closeLightbox();
      });

      // ═══════════════════════════════════════════════════════════
      //  EVENT LISTENERS
      // ═══════════════════════════════════════════════════════════

      // Login
      loginForm.addEventListener("submit", async function (e) {
        e.preventDefault();

        currentUser = document.getElementById("username").value.trim();
        currentChannel = document.getElementById("channel").value.trim();
        currentPassword = document.getElementById("password").value;

        document.getElementById("display-channel").innerText = currentChannel;
        document.getElementById("display-user").innerText = `@${currentUser}`;

        try {
          await connectWebSocket();
        } catch (err) {
          alert(
            "Could not connect to server. Make sure the server is running (node server.js).",
          );
          return;
        }

        loginScreen.classList.add("hidden");
        setTimeout(() => {
          chatScreen.classList.remove("hidden");
          isChatActive = true;
          messageInput.focus();
          chatMessages.innerHTML = "";
          spawnParticles();
          renderDateDivider();
          renderWelcomeCard(currentChannel, currentUser);
          addPresenceUser(currentUser, true);
        }, 400);
      });

      // Chat form submit — BUG-FIX: isSubmitting flag prevents double-send
      // if the user somehow triggers submit twice in rapid succession.
      chatForm.addEventListener("submit", function (e) {
        e.preventDefault();
        if (isSubmitting) return;
        isSubmitting = true;

        // Send staged file first (if any)
        if (stagedFile.file) {
          handleSendFile();
        }

        // Send text message if there's text in the input
        const text = messageInput.value.trim();
        if (text) {
          handleSendMessage(text);
        }

        isSubmitting = false;
      });

      // Leave
      function leaveChat() {
        isChatActive = false;
        isReconnecting = false;
        endCall(false); // hang up any in-progress call

        if (ws) {
          ws.onclose = null;
          ws.onerror = null;
          try {
            ws.close();
          } catch (_) {}
          ws = null;
        }

        chatScreen.classList.add("hidden");
        setTimeout(() => {
          loginScreen.classList.remove("hidden");
          loginForm.reset();
          onlineUsers.forEach((_, k) => removePresenceUser(k));
          onlineUsers.clear();
          presenceList.innerHTML = "";
          currentUser = currentChannel = currentPassword = "";
          reconnectDelay = 2000;
        }, 400);
      }
    </script>
  </body>
</html>
